AWSTemplateFormatVersion: 2010-09-09
Description: CreditOdds Social Media Posting Service

Transform:
- AWS::Serverless-2016-10-31

Parameters:
  ENDPOINT:
    Type: String
    Description: MySQL database endpoint
    NoEcho: true
  DATABASE:
    Type: String
    Description: MySQL database name
    NoEcho: true
  USERNAME:
    Type: String
    Description: MySQL database username
    NoEcho: true
  PASSWORD:
    Type: String
    Description: MySQL database password
    NoEcho: true
  ANTHROPICAPIKEY:
    Type: String
    Description: Anthropic API key for Claude Haiku
    NoEcho: true
  SOCIALAPIKEY:
    Type: String
    Description: API key for CI/CD queue endpoint
    NoEcho: true
  TWITTERAPIKEY:
    Type: String
    Description: Twitter API key
    NoEcho: true
  TWITTERAPISECRET:
    Type: String
    Description: Twitter API secret
    NoEcho: true
  TWITTERACCESSTOKEN:
    Type: String
    Description: Twitter access token
    NoEcho: true
  TWITTERACCESSTOKENSECRET:
    Type: String
    Description: Twitter access token secret
    NoEcho: true
  TWITTERCARDWIREAPIKEY:
    Type: String
    Description: API key for the @card_wire Developer App (leave blank to reuse the shared app)
    Default: ""
    NoEcho: true
  TWITTERCARDWIREAPISECRET:
    Type: String
    Description: API secret for the @card_wire Developer App (leave blank to reuse the shared app)
    Default: ""
    NoEcho: true
  TWITTERCARDWIREACCESSTOKEN:
    Type: String
    Description: User access token for the @card_wire X account
    NoEcho: true
  TWITTERCARDWIREACCESSTOKENSECRET:
    Type: String
    Description: User access token secret for the @card_wire X account
    NoEcho: true
  FACEBOOKPAGEID:
    Type: String
    Description: Facebook Page ID
    Default: ''
  FACEBOOKPAGEACCESSTOKEN:
    Type: String
    Description: Facebook Page Access Token (long-lived)
    NoEcho: true
    Default: ''
  REDDITFEEDTOKEN:
    Type: String
    Description: Random token used in the Reddit feed S3 key so the public feed URL is unguessable
    NoEcho: true
    Default: ''

Resources:
  # S3 Bucket for social media images
  SocialImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: creditodds-social-images
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [PUT]
            AllowedOrigins: ['https://social.creditodds.com', 'http://localhost:3000']
            MaxAge: 300

  # S3 bucket holding the JSON feed polled by the Devvit app (devvit/ in repo).
  # Objects under feed/ are public: Devvit's fetch allowlist permits
  # <bucket>.s3.amazonaws.com but cannot send credentials, so the feed URL's
  # secrecy comes from the REDDITFEEDTOKEN path segment.
  RedditFeedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: creditodds-reddit-feed
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: false
        RestrictPublicBuckets: false

  RedditFeedBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref RedditFeedBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadFeed
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${RedditFeedBucket.Arn}/feed/*'

  # Origin Access Control for CloudFront → S3
  SocialImagesOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: social-images-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # S3 bucket policy granting CloudFront read access
  SocialImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SocialImagesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${SocialImagesBucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${SocialImagesCDN}'

  # CloudFront for image CDN
  SocialImagesCDN:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt SocialImagesBucket.RegionalDomainName
            Id: S3Origin
            OriginAccessControlId: !GetAtt SocialImagesOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        Enabled: true
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false
        PriceClass: PriceClass_100

  # Firebase Token Authorizer
  FirebaseAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/firebase-authorizer.firebaseAuthorizerHandler
      Runtime: nodejs22.x
      MemorySize: 128
      Timeout: 10
      Environment:
        Variables:
          FIREBASE_PROJECT_ID: creditodds

  # API Gateway
  SocialPostingAPI:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        DefaultAuthorizer: FirebaseAuthorizer
        Authorizers:
          FirebaseAuthorizer:
            FunctionArn: !GetAtt FirebaseAuthorizerFunction.Arn
            FunctionPayloadType: TOKEN
            Identity:
              Header: Authorization
              ReauthorizeEvery: 300

  # --- Lambda Functions ---

  SocialPostsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/social-posts.handler
      Runtime: nodejs22.x
      MemorySize: 128
      Timeout: 30
      Description: CRUD operations for social media posts
      Environment:
        Variables:
          ENDPOINT: !Ref ENDPOINT
          DATABASE: !Ref DATABASE
          USERNAME: !Ref USERNAME
          PASSWORD: !Ref PASSWORD
      Events:
        GetPosts:
          Type: Api
          Properties:
            Path: /social/posts
            Method: GET
            RestApiId: !Ref SocialPostingAPI
        CreatePost:
          Type: Api
          Properties:
            Path: /social/posts
            Method: POST
            RestApiId: !Ref SocialPostingAPI
        UpdatePost:
          Type: Api
          Properties:
            Path: /social/posts
            Method: PUT
            RestApiId: !Ref SocialPostingAPI
        DeletePost:
          Type: Api
          Properties:
            Path: /social/posts
            Method: DELETE
            RestApiId: !Ref SocialPostingAPI
        PostsOptions:
          Type: Api
          Properties:
            Path: /social/posts
            Method: OPTIONS
            RestApiId: !Ref SocialPostingAPI
            Auth:
              Authorizer: NONE

  SocialSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/social-scheduler.handler
      Runtime: nodejs22.x
      MemorySize: 256
      Timeout: 120
      Description: Scheduled post publisher - triggered every 35 minutes
      Environment:
        Variables:
          ENDPOINT: !Ref ENDPOINT
          DATABASE: !Ref DATABASE
          USERNAME: !Ref USERNAME
          PASSWORD: !Ref PASSWORD
          TWITTER_API_KEY: !Ref TWITTERAPIKEY
          TWITTER_API_SECRET: !Ref TWITTERAPISECRET
          TWITTER_ACCESS_TOKEN: !Ref TWITTERACCESSTOKEN
          TWITTER_ACCESS_TOKEN_SECRET: !Ref TWITTERACCESSTOKENSECRET
          TWITTER_CARDWIRE_API_KEY: !Ref TWITTERCARDWIREAPIKEY
          TWITTER_CARDWIRE_API_SECRET: !Ref TWITTERCARDWIREAPISECRET
          TWITTER_CARDWIRE_ACCESS_TOKEN: !Ref TWITTERCARDWIREACCESSTOKEN
          TWITTER_CARDWIRE_ACCESS_TOKEN_SECRET: !Ref TWITTERCARDWIREACCESSTOKENSECRET
          FACEBOOK_PAGE_ID: !Ref FACEBOOKPAGEID
          FACEBOOK_PAGE_ACCESS_TOKEN: !Ref FACEBOOKPAGEACCESSTOKEN
          REDDIT_FEED_BUCKET: !Ref RedditFeedBucket
          REDDIT_FEED_TOKEN: !Ref REDDITFEEDTOKEN
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref RedditFeedBucket
      Events:
        ScheduleRule:
          Type: Schedule
          Properties:
            Schedule: rate(35 minutes)
            Description: Post next queued social media post every 35 minutes
            Enabled: true

  SocialPublishFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/social-publish.handler
      Runtime: nodejs22.x
      MemorySize: 256
      Timeout: 120
      Description: Immediately publish a queued post (admin-only)
      Environment:
        Variables:
          ENDPOINT: !Ref ENDPOINT
          DATABASE: !Ref DATABASE
          USERNAME: !Ref USERNAME
          PASSWORD: !Ref PASSWORD
          TWITTER_API_KEY: !Ref TWITTERAPIKEY
          TWITTER_API_SECRET: !Ref TWITTERAPISECRET
          TWITTER_ACCESS_TOKEN: !Ref TWITTERACCESSTOKEN
          TWITTER_ACCESS_TOKEN_SECRET: !Ref TWITTERACCESSTOKENSECRET
          TWITTER_CARDWIRE_API_KEY: !Ref TWITTERCARDWIREAPIKEY
          TWITTER_CARDWIRE_API_SECRET: !Ref TWITTERCARDWIREAPISECRET
          TWITTER_CARDWIRE_ACCESS_TOKEN: !Ref TWITTERCARDWIREACCESSTOKEN
          TWITTER_CARDWIRE_ACCESS_TOKEN_SECRET: !Ref TWITTERCARDWIREACCESSTOKENSECRET
          FACEBOOK_PAGE_ID: !Ref FACEBOOKPAGEID
          FACEBOOK_PAGE_ACCESS_TOKEN: !Ref FACEBOOKPAGEACCESSTOKEN
          REDDIT_FEED_BUCKET: !Ref RedditFeedBucket
          REDDIT_FEED_TOKEN: !Ref REDDITFEEDTOKEN
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref RedditFeedBucket
      Events:
        Publish:
          Type: Api
          Properties:
            Path: /social/publish
            Method: POST
            RestApiId: !Ref SocialPostingAPI
        PublishOptions:
          Type: Api
          Properties:
            Path: /social/publish
            Method: OPTIONS
            RestApiId: !Ref SocialPostingAPI
            Auth:
              Authorizer: NONE

  SocialAccountsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/social-accounts.handler
      Runtime: nodejs22.x
      MemorySize: 128
      Timeout: 30
      Description: Platform account management
      Environment:
        Variables:
          ENDPOINT: !Ref ENDPOINT
          DATABASE: !Ref DATABASE
          USERNAME: !Ref USERNAME
          PASSWORD: !Ref PASSWORD
      Events:
        GetAccounts:
          Type: Api
          Properties:
            Path: /social/accounts
            Method: GET
            RestApiId: !Ref SocialPostingAPI
        UpdateAccount:
          Type: Api
          Properties:
            Path: /social/accounts
            Method: PUT
            RestApiId: !Ref SocialPostingAPI

  SocialSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/social-settings.handler
      Runtime: nodejs22.x
      MemorySize: 128
      Timeout: 30
      Description: Global social posting settings
      Environment:
        Variables:
          ENDPOINT: !Ref ENDPOINT
          DATABASE: !Ref DATABASE
          USERNAME: !Ref USERNAME
          PASSWORD: !Ref PASSWORD
      Events:
        GetSettings:
          Type: Api
          Properties:
            Path: /social/settings
            Method: GET
            RestApiId: !Ref SocialPostingAPI
        UpdateSettings:
          Type: Api
          Properties:
            Path: /social/settings
            Method: PUT
            RestApiId: !Ref SocialPostingAPI
        SettingsOptions:
          Type: Api
          Properties:
            Path: /social/settings
            Method: OPTIONS
            RestApiId: !Ref SocialPostingAPI
            Auth:
              Authorizer: NONE
        AccountsOptions:
          Type: Api
          Properties:
            Path: /social/accounts
            Method: OPTIONS
            RestApiId: !Ref SocialPostingAPI
            Auth:
              Authorizer: NONE

  SocialGenerateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/social-generate.handler
      Runtime: nodejs22.x
      MemorySize: 128
      Timeout: 30
      Description: Generate social media post text using Claude Haiku
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref ANTHROPICAPIKEY
      Events:
        Generate:
          Type: Api
          Properties:
            Path: /social/generate
            Method: POST
            RestApiId: !Ref SocialPostingAPI
        GenerateOptions:
          Type: Api
          Properties:
            Path: /social/generate
            Method: OPTIONS
            RestApiId: !Ref SocialPostingAPI
            Auth:
              Authorizer: NONE

  SocialUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/social-upload.handler
      Runtime: nodejs22.x
      MemorySize: 128
      Timeout: 10
      Description: Generate presigned S3 URLs for image upload
      Environment:
        Variables:
          S3_BUCKET: !Ref SocialImagesBucket
          CDN_DOMAIN: !GetAtt SocialImagesCDN.DomainName
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref SocialImagesBucket
      Events:
        Upload:
          Type: Api
          Properties:
            Path: /social/upload
            Method: POST
            RestApiId: !Ref SocialPostingAPI
        UploadOptions:
          Type: Api
          Properties:
            Path: /social/upload
            Method: OPTIONS
            RestApiId: !Ref SocialPostingAPI
            Auth:
              Authorizer: NONE

  SocialQueueFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/social-queue.handler
      Runtime: nodejs22.x
      MemorySize: 128
      Timeout: 30
      Description: Queue posts from CI/CD (API-key auth, no Firebase)
      Environment:
        Variables:
          ENDPOINT: !Ref ENDPOINT
          DATABASE: !Ref DATABASE
          USERNAME: !Ref USERNAME
          PASSWORD: !Ref PASSWORD
          SOCIAL_API_KEY: !Ref SOCIALAPIKEY
          S3_BUCKET: !Ref SocialImagesBucket
          CDN_DOMAIN: !GetAtt SocialImagesCDN.DomainName
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref SocialImagesBucket
      Events:
        QueuePost:
          Type: Api
          Properties:
            Path: /social/queue
            Method: POST
            RestApiId: !Ref SocialPostingAPI
            Auth:
              Authorizer: NONE
        QueueOptions:
          Type: Api
          Properties:
            Path: /social/queue
            Method: OPTIONS
            RestApiId: !Ref SocialPostingAPI
            Auth:
              Authorizer: NONE

  SocialSchedulerErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub "/aws/lambda/${SocialSchedulerFunction}"
      FilterPattern: '"Scheduler error:"'
      MetricTransformations:
        - MetricNamespace: CreditOdds/SocialPosting
          MetricName: SocialSchedulerErrors
          MetricValue: "1"

  SocialSchedulerErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-SocialSchedulerErrors"
      AlarmDescription: Alarm when the social scheduler logs repeated errors.
      Namespace: CreditOdds/SocialPosting
      MetricName: SocialSchedulerErrors
      Statistic: Sum
      Period: 900
      EvaluationPeriods: 1
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  SocialPostingAPIUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${SocialPostingAPI}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  SocialImagesBucketName:
    Description: S3 bucket for social images
    Value: !Ref SocialImagesBucket
  SocialImagesCDNDomain:
    Description: CloudFront domain for social images
    Value: !GetAtt SocialImagesCDN.DomainName
  RedditFeedBucketDomain:
    Description: Host for the Devvit-polled Reddit feed (feed URL is https://<this>/feed/<token>.json)
    Value: !Sub '${RedditFeedBucket}.s3.${AWS::Region}.amazonaws.com'
